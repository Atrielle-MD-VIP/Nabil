<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SaveTik - Download video TikTok tanpa watermark gratis dengan kualitas HD. Cepat, aman, dan tanpa login.">
    <meta name="keywords" content="SaveTik, download video tiktok, tiktok no watermark">
    <meta name="author" content="Nabil Assihidiqi">
    <title>SaveTik - Download Video TikTok No Watermark</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: #0f0f0f; 
            color: #e0e0e0;
            overflow-x: hidden;
        }
        
        .bg-grid {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }
        
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
            z-index: -1;
            filter: blur(50px);
            transition: background 0.5s ease;
        }
        
        .glass { 
            background: rgba(20, 20, 20, 0.7); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.08); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .btn-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
        }
        
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5);
        }

        .btn-gradient-ig {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            transition: all 0.3s ease;
        }
        
        .btn-gradient-ig:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(236, 72, 153, 0.5);
        }
        
        .social-icons a {
            color: #4b5563;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }
        
        .social-icons a:hover {
            color: #3b82f6;
            transform: translateY(-3px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-shake {
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0f0f0f;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #3b82f6, #8b5cf6);
            border-radius: 10px;
        }

        input::placeholder {
            color: #4b5563;
            font-size: 0.9rem;
        }

        #urlInput:focus {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
        }

        .spinner {
            border: 4px solid rgba(59, 130, 246, 0.2);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-card {
            background: rgba(30, 30, 30, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            overflow: hidden;
        }
        
        .preview-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: #3b82f6;
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 6px 14px;
            border-radius: 8px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        .download-btn-green {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            transition: all 0.3s ease;
        }
        
        .download-btn-green:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.4);
        }
        
        .download-btn-green:active {
            transform: scale(0.98);
        }

        .back-btn {
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            color: white;
        }

        .coming-soon-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 15, 15, 0.98);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        /* Video player styles */
        .video-container {
            position: relative;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .video-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .video-container:hover .video-overlay {
            opacity: 1;
        }
        
        .play-btn {
            width: 64px;
            height: 64px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            position: relative;
        }
        
        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 30%;
            background: white;
            border-radius: 2px;
        }
        
        .progress-knob {
            position: absolute;
            left: 30%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            text-align: center;
            padding: 16px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 16px;
        }
    </style>
</head>
<body class="bg-grid flex items-center justify-center min-h-screen p-4 sm:p-8">

    <!-- Background Glows -->

    <div class="glow bottom-10 right-10" style="background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);"></div>

    <div class="max-w-2xl w-full glass p-6 sm:p-10 rounded-[2.5rem] relative overflow-hidden">
        
        <!-- Platform Switcher -->
        <div class="flex p-1 bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 mb-8 max-w-[320px] mx-auto relative z-20">
            <button onclick="switchTab('tiktok')" id="tab-tiktok" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition-all bg-gradient-to-r from-blue-500 to-indigo-600 text-white shadow-lg flex items-center justify-center gap-2">
                <i class="fab fa-tiktok"></i>TikTok
            </button>
            <button onclick="switchTab('instagram')" id="tab-instagram" class="flex-1 py-2.5 rounded-xl text-sm font-bold text-gray-400 hover:text-white transition-all flex items-center justify-center gap-2">
                <i class="fab fa-instagram"></i>Instagram

        </div>

        <!-- Input Section -->
        <div id="inputSection" class="block animate-fade-in">
            <header class="text-center mb-10">
                <div class="inline-block p-3 rounded-2xl bg-white/5 mb-4 border border-white/10">
                    <div id="headerIcon">
                        <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path>
                        </svg>
                    </div>

                    <span id="brandTitle" class="bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 bg-clip-text text-transparent">
                        SaveTik
                    </span>
                </h1>

            <div class="space-y-4 relative z-10">
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i id="inputIcon" class="fab fa-tiktok text-lg text-gray-500 group-focus-within:text-blue-500 transition-colors"></i>
                    </div>
                    <input type="text" id="urlInput" placeholder="Tempel tautan video disini..." class="w-full pl-12 pr-4 py-5 rounded-2xl bg-[#161616] border border-white/10 focus:border-blue-500/50 focus:outline-none transition-all text-white placeholder-gray-600 text-sm">
                </div>
                
                <button onclick="handleDownload()" id="btnDownload" class="w-full btn-gradient text-white font-extrabold text-lg py-5 rounded-2xl flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span id="btnText">Download Video</span>
                    <svg id="btnIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>

        </div>

        <!-- Result Section -->
        <div id="resultSection" class="hidden animate-fade-in relative">
            
            <div class="flex items-center justify-between mb-6 pb-6 border-b border-white/5">
                <button onclick="backToHome()" class="back-btn text-gray-400 flex items-center gap-2 transition-all group">
                    <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    <span class="font-medium text-sm">Kembali</span>
                </button>
                <div class="px-3 py-1 bg-blue-500/10 border border-blue-500/20 rounded-full">
                    <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Nabil Assihidiqi</span>
                </div>
            </div>

            <!-- Loading -->
            <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
                <div class="spinner mb-4"></div>
                <p class="text-gray-400 animate-pulse text-sm font-medium tracking-wide">Sabar Sayang...</p>
            </div>
            
            <!-- Error -->
            <div id="errorMsg" class="hidden p-4 bg-red-500/10 border border-red-500/30 rounded-xl flex items-start gap-3 text-red-400 mb-4">
                <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                </svg>
                <div>
                    <h4 class="font-semibold text-red-300 text-sm">Error</h4>
                    <p id="errorText" class="text-xs mt-1 text-red-400/80"></p>

            <!-- Content -->

        <!-- Footer -->

    </div>

    <!-- Coming Soon Overlay -->
    <div id="comingSoonOverlay" class="coming-soon-overlay hidden">
        <div class="text-center p-8 max-w-sm">
            <div class="w-20 h-20 bg-gradient-to-tr from-purple-500 to-pink-500 rounded-3xl mx-auto flex items-center justify-center mb-6 shadow-lg">
                <i class="fab fa-instagram text-4xl text-white"></i>
            </div>
            <h3 class="text-white font-bold text-2xl mb-3">Segera Hadir!</h3>
            <p class="text-gray-400 text-sm leading-relaxed mb-8">
                Maaf, fitur download Instagram saat ini belum tersedia. Akan segera hadir nanti! 🚀
            </p>
            <button onclick="switchTab('tiktok')" class="px-8 py-3.5 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl transition-all text-sm shadow-lg shadow-blue-600/25">
                Kembali ke TikTok
            </button>
        </div>
    </div>

    <script>
        let currentMode = 'tiktok';
        let currentData = null;
        
        const API_TIKTOK = 'https://www.tikwm.com/api/';

        function switchTab(mode) {
            currentMode = mode;
            const tabTik = document.getElementById('tab-tiktok');
            const tabIg = document.getElementById('tab-instagram');
            const brandTitle = document.getElementById('brandTitle');
            const brandDesc = document.getElementById('brandDesc');
            const inputIcon = document.getElementById('inputIcon');
            const urlInput = document.getElementById('urlInput');
            const btnDownload = document.getElementById('btnDownload');
            const mainGlow = document.getElementById('mainGlow');
            const headerIcon = document.getElementById('headerIcon');
            const comingSoon = document.getElementById('comingSoonOverlay');

            urlInput.value = '';
            clearError();
            backToHome();

            if (mode === 'instagram') {
                tabIg.className = "flex-1 py-2.5 rounded-xl text-sm font-bold transition-all bg-gradient-to-r from-purple-500 to-pink-600 text-white shadow-lg flex items-center justify-center gap-2";
                tabTik.className = "flex-1 py-2.5 rounded-xl text-sm font-bold text-gray-400 hover:text-white transition-all flex items-center justify-center gap-2";
                
                brandTitle.innerText = "SaveGram";
                brandDesc.innerText = "Download Reels & Photo Instagram";
                inputIcon.className = "fab fa-instagram text-lg text-gray-500 group-focus-within:text-purple-500 transition-colors";
                urlInput.placeholder = "Tempel tautan video disini...";
                
                btnDownload.classList.remove('btn-gradient');
                btnDownload.classList.add('btn-gradient-ig');
                mainGlow.style.background = "radial-gradient(circle, rgba(236, 72, 153, 0.2) 0%, transparent 70%)";
                
                headerIcon.innerHTML = `<i class="fab fa-instagram text-3xl text-pink-500"></i>`;
                
                document.getElementById('btnDownload').onclick = showComingSoon;
                
            } else {
                tabTik.className = "flex-1 py-2.5 rounded-xl text-sm font-bold transition-all bg-gradient-to-r from-blue-500 to-indigo-600 text-white shadow-lg flex items-center justify-center gap-2";
                tabIg.className = "flex-1 py-2.5 rounded-xl text-sm font-bold text-gray-400 hover:text-white transition-all flex items-center justify-center gap-2";
                
                brandTitle.innerText = "SaveTik";
                brandDesc.innerText = "Fast, Secure, & No Watermark";
                inputIcon.className = "fab fa-tiktok text-lg text-gray-500 group-focus-within:text-blue-500 transition-colors";
                urlInput.placeholder = "Tempel tautan video disini...";
                
                btnDownload.classList.remove('btn-gradient-ig');
                btnDownload.classList.add('btn-gradient');
                mainGlow.style.background = "radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%)";
                
                headerIcon.innerHTML = `<svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>`;
                
                comingSoon.classList.add('hidden');
                document.getElementById('btnDownload').onclick = handleDownload;
            }
        }

        function showComingSoon() {
            const comingSoon = document.getElementById('comingSoonOverlay');
            comingSoon.classList.remove('hidden');
        }

        function backToHome() {
            const inputSection = document.getElementById('inputSection');
            const resultSection = document.getElementById('resultSection');
            const comingSoon = document.getElementById('comingSoonOverlay');
            const loading = document.getElementById('loading');
            const errorMsg = document.getElementById('errorMsg');
            const content = document.getElementById('content');
            
            inputSection.classList.remove('hidden');
            resultSection.classList.add('hidden');
            comingSoon.classList.add('hidden');
            
            loading.classList.add('hidden');
            errorMsg.classList.add('hidden');
            content.classList.add('hidden');
            content.innerHTML = '';
            currentData = null;
        }

        async function handleDownload() {
            if (currentMode === 'instagram') {
                showComingSoon();
                return;
            }
            await downloadTikTok();
        }

        function showError(message) {
            const inputWrapper = document.querySelector('.group');
            const urlInput = document.getElementById('urlInput');
            
            inputWrapper.classList.add('animate-shake');
            urlInput.classList.add('border-red-500/50');
            
            const existing = inputWrapper.querySelector('.error-tooltip');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'absolute -top-12 left-1/2 -translate-x-1/2 bg-red-500 text-white text-xs font-bold px-4 py-2 rounded-lg shadow-xl animate-fade-in z-50 whitespace-nowrap';
            toast.innerHTML = `
                <div class="flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    ${message}
                </div>
            `;
            
            inputWrapper.appendChild(toast);
            if (navigator.vibrate) navigator.vibrate([50, 100, 50]);

            setTimeout(() => {
                inputWrapper.classList.remove('animate-shake');
                urlInput.classList.remove('border-red-500/50');
                toast.remove();
            }, 3000);
        }

        function clearError() {
            const inputWrapper = document.querySelector('.group');
            const urlInput = document.getElementById('urlInput');
            const existing = inputWrapper.querySelector('.error-tooltip');
            if (existing) existing.remove();
            urlInput.classList.remove('border-red-500/50');
        }

        function formatNumber(num) {
            if (!num) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        async function downloadTikTok() {
            const url = document.getElementById('urlInput').value.trim();
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const btnLoader = document.getElementById('btnLoader');
            const btnDownload = document.getElementById('btnDownload');
            
            if (!url) {
                showError('Masukkan link TikTok dulu!');
                return;
            }
            
            if (!url.includes('tiktok.com')) {
                showError('Link tidak valid! Pastikan link dari TikTok.');
                return;
            }

            btnDownload.disabled = true;
            btnText.textContent = 'Memproses...';
            btnIcon.classList.add('hidden');
            btnLoader.classList.remove('hidden');

            try {
                const response = await fetch(`${API_TIKTOK}?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if (data.code !== 0 || !data.data) {
                    throw new Error('Gagal mengambil data video. Coba link lain.');
                }

                currentData = data.data;
                showResult(currentData);
                
            } catch (error) {
                showError(error.message || 'Terjadi kesalahan. Coba lagi nanti.');
            } finally {
                btnDownload.disabled = false;
                btnText.textContent = 'Download Video';
                btnIcon.classList.remove('hidden');
                btnLoader.classList.add('hidden');
            }
        }

        function showResult(data) {
            const inputSection = document.getElementById('inputSection');
            const resultSection = document.getElementById('resultSection');
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');
            
            inputSection.classList.add('hidden');
            resultSection.classList.remove('hidden');
            loading.classList.add('hidden');
            content.classList.remove('hidden');

            const cover = data.cover || data.origin_cover;
            const play = data.play;
            const wmplay = data.wmplay;
            const music = data.music;
            const title = data.title || 'TikTok Video';
            const author = data.author?.nickname || 'Unknown';
            const authorId = data.author?.unique_id || '';
            const avatar = data.author?.avatar || '';
            const diggCount = data.digg_count || 0;
            const shareCount = data.share_count || 0;
            const playCount = data.play_count || 0;
            const duration = data.duration || 0;

            // Format duration
            const mins = Math.floor(duration / 60);
            const secs = duration % 60;
            const durationStr = `${mins}:${secs.toString().padStart(2, '0')}`;

            content.innerHTML = `
                <div class="result-card">
                    <!-- Video Player -->
                    <div class="video-container relative aspect-video bg-black">
                        <video 
                            id="previewVideo"
                            src="${play}" 
                            poster="${cover}"
                            class="w-full h-full object-cover"
                            preload="metadata"
                        ></video>
                        
                        <!-- Play/Pause Overlay -->
                        <div id="videoOverlay" class="video-overlay" style="opacity: 1;">
                            <div class="play-btn" onclick="toggleVideo()">
                                <svg id="playIcon" class="w-6 h-6 text-black ml-1" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                                <svg id="pauseIcon" class="w-6 h-6 text-black hidden" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                                </svg>
                            </div>
                        </div>
                        
                        <!-- Video Controls -->
                        <div class="video-controls">
                            <span class="text-white text-xs font-medium" id="timeDisplay">0:00/${durationStr}</span>
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill"></div>
                                <div class="progress-knob" id="progressKnob"></div>
                            </div>
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
                            </svg>
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
                            </svg>
                            <span class="preview-badge" style="position: static;">Preview</span>
                        </div>
                    </div>
                    
                    <!-- Title & Author -->
                    <div class="p-5">
                        <h3 class="text-white font-bold text-base leading-snug mb-2 line-clamp-2">${title}</h3>
                        <a href="https://tiktok.com/@${authorId}" target="_blank" class="text-blue-400 text-sm font-medium hover:underline">
                            @${authorId}
                        </a>
                        
                        <!-- Stats Grid -->
                        <div class="stats-grid">
                            <div>
                                <div class="text-gray-500 text-[10px] uppercase tracking-wider font-semibold mb-1">Likes</div>
                                <div class="text-white font-bold text-lg">${formatNumber(diggCount)}</div>
                            </div>
                            <div>
                                <div class="text-gray-500 text-[10px] uppercase tracking-wider font-semibold mb-1">Shares</div>
                                <div class="text-white font-bold text-lg">${formatNumber(shareCount)}</div>
                            </div>
                            <div>
                                <div class="text-gray-500 text-[10px] uppercase tracking-wider font-semibold mb-1">Views</div>
                                <div class="text-white font-bold text-lg">${formatNumber(playCount)}</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Download Buttons -->
                    <div class="px-5 pb-5 space-y-3">
                        <a href="${play}" target="_blank" download class="block w-full download-btn-green text-white font-extrabold text-base py-4 rounded-2xl text-center flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                            </svg>
                            Download No Watermark
                        </a>
                        
                        <a href="${wmplay}" target="_blank" download class="block w-full bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 font-bold text-sm py-3.5 rounded-2xl text-center transition-all">
                            Download With Watermark
                        </a>
                        
                        ${music ? `
                        <a href="${music}" target="_blank" download class="block w-full bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 font-bold text-sm py-3.5 rounded-2xl text-center transition-all flex items-center justify-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"></path>
                            </svg>
                            Download Audio
                        </a>
                        ` : ''}
                    </div>
                </div>
            `;

            // Setup video player
            setupVideoPlayer();
        }

        function setupVideoPlayer() {
            const video = document.getElementById('previewVideo');
            const overlay = document.getElementById('videoOverlay');
            const playIcon = document.getElementById('playIcon');
            const pauseIcon = document.getElementById('pauseIcon');
            const progressFill = document.getElementById('progressFill');
            const progressKnob = document.getElementById('progressKnob');
            const timeDisplay = document.getElementById('timeDisplay');

            if (!video) return;

            video.addEventListener('timeupdate', () => {
                const progress = (video.currentTime / video.duration) * 100;
                if (progressFill) progressFill.style.width = progress + '%';
                if (progressKnob) progressKnob.style.left = progress + '%';
                
                const mins = Math.floor(video.currentTime / 60);
                const secs = Math.floor(video.currentTime % 60);
                const totalMins = Math.floor(video.duration / 60) || 0;
                const totalSecs = Math.floor(video.duration % 60) || 0;
                if (timeDisplay) timeDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')}/${totalMins}:${totalSecs.toString().padStart(2, '0')}`;
            });

            video.addEventListener('play', () => {
                if (playIcon) playIcon.classList.add('hidden');
                if (pauseIcon) pauseIcon.classList.remove('hidden');
                if (overlay) overlay.style.opacity = '0';
            });

            video.addEventListener('pause', () => {
                if (playIcon) playIcon.classList.remove('hidden');
                if (pauseIcon) pauseIcon.classList.add('hidden');
                if (overlay) overlay.style.opacity = '1';
            });

            video.addEventListener('ended', () => {
                if (playIcon) playIcon.classList.remove('hidden');
                if (pauseIcon) pauseIcon.classList.add('hidden');
                if (overlay) overlay.style.opacity = '1';
            });
        }

        function toggleVideo() {
            const video = document.getElementById('previewVideo');
            if (!video) return;
            
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        }

        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleDownload();
        });
    </script>
</body>
</html>
